name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        shell: pwsh
        run: |
          $url = 'https://github.com/AutoHotkey/AutoHotkey/releases/download/v2.0.19/AutoHotkey_2.0.19.zip'
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\ahk.zip"
          Expand-Archive "$env:RUNNER_TEMP\ahk.zip" -DestinationPath "$env:RUNNER_TEMP\ahk"
          Add-Content -Path $env:GITHUB_PATH -Value "$env:RUNNER_TEMP\ahk"

      - name: Check generated files are up to date
        shell: pwsh
        run: |
          python scripts/generate_allowlists.py
          git diff --exit-code -- src/generated
          if ($LASTEXITCODE -ne 0) {
            Write-Host 'src/generated is stale. Run: python scripts/generate_allowlists.py'
            exit 1
          }

      - name: Syntax-check AHK scripts
        shell: pwsh
        run: |
          $entries = @(
            'src\SapWrapper.ahk',
            'src\SapWrapper2.ahk',
            'src\Sm30BulkLoader.ahk',
            'src\Sm30BulkImportGui.ahk',
            'src\Sm30ExcelImport.ahk',
            'src\Sm30JsonConfig.ahk',
            'src\Sm30SapSessions.ahk',
            'src\Sm30TableCatalog.ahk',
            'tests\run_tests.ahk2'
          )
          $entries += Get-ChildItem examples -Recurse -Filter *.ahk2 | ForEach-Object { $_.FullName }
          $ahk = (Get-Command AutoHotkey64.exe).Source
          $failed = $false
          foreach ($f in $entries) {
            # AutoHotkey64.exe is a GUI-subsystem app; piping its output in
            # PowerShell can deadlock on CI runners. Use Start-Process with
            # file redirection and an explicit timeout instead.
            $out = Join-Path $env:RUNNER_TEMP 'ahk_validate.log'
            $p = Start-Process -FilePath $ahk -ArgumentList '/ErrorStdOut', '/validate', "`"$f`"" -RedirectStandardOutput $out -NoNewWindow -PassThru
            if (-not $p.WaitForExit(60000)) {
              $p.Kill()
              Write-Host "TIMEOUT: $f"
              $failed = $true
              continue
            }
            Get-Content $out | Write-Output
            if ($p.ExitCode -ne 0) {
              Write-Host "SYNTAX FAIL: $f"
              $failed = $true
            } else {
              Write-Host "OK: $f"
            }
          }
          if ($failed) { exit 1 }

      - name: Run headless tests
        shell: pwsh
        run: |
          $ahk = (Get-Command AutoHotkey64.exe).Source
          $out = Join-Path $env:RUNNER_TEMP 'ahk_tests.log'
          $p = Start-Process -FilePath $ahk -ArgumentList '/ErrorStdOut', 'tests\run_tests.ahk2' -RedirectStandardOutput $out -NoNewWindow -PassThru
          if (-not $p.WaitForExit(300000)) {
            $p.Kill()
            Write-Host 'TIMEOUT: tests\run_tests.ahk2'
            exit 1
          }
          Get-Content $out | Write-Output
          exit $p.ExitCode
